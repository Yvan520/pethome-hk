btitle:"跨服PVE/PVP混合",description:"跨服务器共同游玩，每周基本5小时(可用星云充能石增加)。中立区(抵抗军探查基地)、PVE区(迷雾森林)、PVP区(亚奇恩驻地/兽人部落/牺牲寺院/被封印圣所)。可获得星云石、符文、人工制品、星云饰品。",tips:["每地区不定时整点出现野外首领","每天1场活动+1场星云岛首领","周日2场首领皆为公会模式","PVP区注意敌对公会偷袭","星云充能石可增加入场时间"],icon:"🌌",type:"大型战场"},{title:"公会据点战",subtitle:"祈愿石/次元石/深渊石",description:"祈愿石：每个野外地区1个，周一/五22:00争夺(跨服公会战)。次元石：每个野外首领1个，周二/六22:00争夺。深渊石：非保护时间随时可争夺。宣战在争夺前一天早至当天早进行。",tips:["宣战在争夺前一天早至当天早","占点期间公会页面可直接传送","攻方使用变身翻越城墙","守方布置公会用品商人","配合天气使用范围技能"],icon:"🏰",type:"公会战"},{title:"战场系统",subtitle:"周1-5 17-24/周末12-24",description:"两队争夺多个据点，达到条件可操作战场高仑或特殊变身。胜利80铸币/和局60/失败40，每场贡献最多20铸币，周上限800。配队先选角色(坦/打/补)，限定对应武器。",tips:["优先占领据点多于击杀","破坏箱子获得战场增益","注意高仑刷新时机","组满3人队提高胜率","战场新地图:巨人之都"],icon:"⚡",type:"占领战"},{title:"角色分工配装",subtitle:"PVP主流职业",description:"PVP强度排名：T0剑盾、T0.5枪盾/剑枪、T1剑匕/枪匕、T1.5弩匕。主流搭配：剑匕(控制满)、弓法(远程站桩)、盾奶(补师)。各职业准备2套武器切换方案。PVP套装推荐圣灵4(HP换减伤)。",tips:["剑匕:亡灵4套装血撑满","弩匕:暴击面板须达750","命中180+是剑匕基础要求","各职业准备2套武器切换方案","PVP套装推荐圣灵4(HP换减伤)"],icon:"🛡️",type:"配装推荐"},{title:"天气战术系统",subtitle:"自然环境影响战局",description:"游戏中的天气系统直接影响战斗效果。暴雨天连锁+2，法系(魔杖)伤害提升47%。雪天冻结概率3.2倍。风天火焰范围扩大。顶级PVP玩家会根据天气预报调整武器轮换和战术策略。",tips:["暴雨天优先用法系(魔杖连锁+2)","雪天带冻结技能提高控制成功率","风天火焰技能范围扩大适合群伤","天气每15-30分钟变化一次","公会战前查看天气预报提前布阵"],icon:"🌤️",type:"进阶战术"},{title:"变身攻防战",subtitle:"变形在PVP中的应用",description:"攻城战时高仑变身可投掷队友越墙。骷髅变身特定深渊区域不被主动攻击。狼形态加速追击和撤退。鸟形态滑翔高空侦察敌方部署。变身时机和形态选择是高端PVP的分水岭。",tips:["攻城战高仑变身翻越城墙是核心战术","骷髅变身潜入深渊PVP区绕后偷袭","狼形态加速追击残血或撤退","鸟形态高空侦察敌方阵营部署","变身期间注意持续时间提前准备切换"],icon:"🐺",type:"变身战术"},{title:"PVP装备搭配指南",subtitle:"防具/饰品/武器选择",description:"PVP防具主流选择：圣灵4件套(HP换减伤，PVP核心)，亡灵4件套(血量撑满，剑匕专用)。属性优先级：防御/生命力/冷却/移速。武器选择：主武+副武各准备2套方案应对不同对手。饰品推荐带减伤和控制抵抗属性。",tips:["圣灵4件套是PVP泛用最优解","亡灵4件套适合剑匕爆发流","饰品优先减伤和控制抵抗","武器准备2套应对不同对手","防具属性选防御/生命力/冷却/移速"],icon:"👑",type:"装备策略"}],Do=[{step:1,title:"选择服务器",desc:"亚服推荐「葛瑞达」，使用NC Purple平台下载。国际服推荐日本太平洋区「Prophecy」，Steam下载。亚服有专属快速成长箱，新手免费获得整套英雄装备(含技能书/人工制品/符文)。",icon:"🌏"},{step:2,title:"环境设定",desc:"认知强化模式→总是使用(显示血条)。关闭自动选择目标第2顺位。攻击设置勾选方向技能选项。打BOSS时调恢复90-100%。自定义快捷键，6以后改到Alt组合。",icon:"⚙️"},{step:3,title:"升级路线(1-55)",desc:"主线紫色任务最快，约10小时到50级。主线和支线都要做，纯主线会卡级。10级开委托(核心日常)。55后必做外传「我的快乐小屋」「希拉贝斯的双翼(上)(下)」。",icon:"📜"},{step:4,title:"世界树的引导",desc:"新手追赶机制。1阶段获整套装备(高级→稀有→英雄1→英雄2)。战力5000+玩家获转换石/萃取石/解锁石。2阶段获项链。1-5阶段逐步获重要物品。",icon:"🌳"},{step:5,title:"每日必做清单",desc:"①委托x10(优先高磨结晶/祝福袋)②神秘钥匙x5(委托铸币商)③世界树叶子买满④公会捐赠⑤深渊刷怪(凭证上限4万)⑥次元阵副本⑦地区活动(推荐化险为夷/黑曜石/神兽之手)。",icon:"✅"},{step:6,title:"属性加点参考",desc:"主属性30后需2点升1级。30/40/50/60/70提供额外加成。坦补推荐斗志50-70(防御/生命/强击命中)。打手中气70(暴击/闪避)。PVE智慧70(冷却/元素力)。PVP洞察60+(命中)。",icon:"📊"},{step:7,title:"装备强化系统",desc:"①强化：1-9级使用普通强化石，9-12使用高级，1-3失败不掉级，4-6失败降1级，7-12失败归0。祝福效率是普通2-3倍。②特性：同装备喂食解锁特性(蓝装给2条紫装可洗)。副本/制作/世界树/神秘环球获得同类装备。③转换：装备可100%转换为同部位指定装备(英雄2及以上用转换石)。④萃取：装备分解为萃取石，用于制作武器专家印章。⑤拓印/共鸣：拓印提供基础属性倍率，共鸣提供固定属性。",icon:"🔨"},{step:8,title:"技能系统概览",desc:"所有主动技能可升到5级(紫书)/特殊到3级，被动到5级(蓝书)/20级(任务书)。防具技能通过装备获取。武器专业度：纯主武满(600转)+副武(501转)+坦补(双职业均分350/350)。技能特化：右击技能配置额外效果(收藏增加量)。推荐优先升级核心输出/治疗技能。",icon:"📖"},{step:9,title:"符文系统",desc:"符文分攻击/防御/功能三色，装在符文页中。每个技能+3孔配属性(每个属性1-4级)。同色3枚激活套装效果。从次元阵副本/世界树/制作/神秘环球/星云岛获取。周3枚解锁石从世界树和制作获取。初期关注套装加成，后期追求属性值。",icon:"💠"},{step:10,title:"深渊 & 神秘环球",desc:"①深渊副本(Abyss Dungeon)：刷怪秘境消耗深渊凭证，共4区域可到Boss前传送点/回城。凭证上限4万/周，梦魇岛2万。可获得优质强化石和装备制作材料。②神秘环球(Mystic Globe)：地图上随机出现的环球，点击出怪或采集物。紫环球需7个开一次Boss。环球钥匙委托铸币商买。完成后随机可进入幻象回廊隐藏地图。",icon:"🌀"}],xh=[{tier:"S",color:"#ff4757",bgColor:"rgba(255, 71, 87, 0.15)",combos:[{name:"双手剑 + 短剑",role:"近战爆发",desc:"剑匕组合，小规模PVP之王，爆发高控制强"},{name:"长矛 + 短剑",role:"近战DPS",desc:"枪匕组合，深渊清怪之王，真理B2效率最高"},{name:"弩弓 + 短剑",role:"中程爆发",desc:"弩匕组合，从以前强到现在的T0"},{name:"长弓 + 魔法棒",role:"补师",desc:"弓书组合，最强补师，副本标配"},{name:"铁爪 + 短剑",role:"近战压制",desc:"爪匕组合，PVP新版本强势选择"}]},{tier:"A",color:"#ffa502",bgColor:"rgba(255, 165, 2, 0.15)",combos:[{name:"长剑 + 双手剑",role:"坦克",desc:"盾剑组合，最硬坦克，高难团本首选"},{name:"长剑 + 长矛",role:"坦克/近战",desc:"盾枪组合，群体瞬间爆发最高"},{name:"魔杖 + 魔法棒",role:"法系补师",desc:"法书组合，伤害最高的奶"},{name:"长弓 + 魔杖",role:"远程法系",desc:"弓法组合，远程火力压制"},{name:"魔力球 + 弩弓",role:"远程输出",desc:"球弩组合，新版本热门远程搭配"},{name:"魔力球 + 魔法棒",role:"辅助/治疗",desc:"球书组合，团队生存最大化"},{name:"长矛 + 魔法棒",role:"近战爆发/辅",desc:"枪书组合，表攻1100爆发30万"}]},{tier:"B",color:"#2ed573",bgColor:"rgba(46, 213, 115, 0.15)",combos:[{name:"长剑 + 魔法棒",role:"坦辅",desc:"盾书组合，坦+自疗，PVP一直强势"},{name:"弩弓 + 长弓",role:"双远程DPS",desc:"弓弩组合，PVE清怪效率高"}]}],vh=[{name:"疾驰(狼)",icon:"🐺",effect:"提高地面移动速度，快速穿越野外区域和战场",type:"野性·移动"},{name:"滑翔(鸟)",icon:"🦅",effect:"空中滑翔飞行，雨天解锁更多区域和隐藏地形",type:"野性·机动"},{name:"游泳(鱼)",icon:"🐟",effect:"水中快速游泳探索水下区域和岛屿",type:"野性·探索"},{name:"攻城高仑",icon:"🗿",effect:"变身投掷队友翻越城墙，攻城战专用",type:"特殊·攻城"},{name:"骷髅兵变身",icon:"💀",effect:"特定深渊区域不被主动攻击",type:"特殊·伪装"},{name:"士兵娃娃",icon:"🧸",effect:"召唤协助拾取和恢复生命，未召唤的派出远征",type:"收集·养成"}],bh=[{name:"辉币",icon:"💎",desc:"交易所专属货币。上架装备/萃取物/家具/食物/材料/灵石(大成功)卖出获得。背包扩至150格以上需辉币。每次上架最低10辉币。",obtain:"充值 / 交易所卖出装备材料",color:"#9b59b6"},{name:"索兰特币",icon:"🪙",desc:"基础游戏货币。打怪、任务、出售物品获得。用于制作和强化。背包150格以内扩充用索兰特币。",obtain:"打怪掉落 / 任务奖励 / 出售物品",color:"#f39c12"},{name:"委托铸币",icon:"📋",desc:"完成委托得核心日常货币。推荐购买：萃取石、珍贵恢复灵石配方、神秘钥匙、武器选择箱。",obtain:"每日委托 / 料理委托 / 深渊选择箱",color:"#2ecc71"},{name:"深渊凭证",icon:"🌀",desc:"进入深渊副本的凭证，每周上限4万(梦魇岛2万)。深渊中刷怪掉落优质强化石和制作材料。周一上午重置。",obtain:"每日委托 / 地区活动 / 自然恢复",color:"#8e44ad"},{name:"高贵磨练结晶",icon:"💠",desc:"制作英雄2/3段装备的核心材料。3阶副本和每周任务(化险为夷/黑曜石/神兽之手)获得。杜兰德合作活动也会掉落。",obtain:"3阶副本 / 化险为夷 / 黑曜石 / 神兽之手 / 杜兰德活动",color:"#e74c3c"}],os={rods:[{name:"竹鱼竿",level:"+0",source:"委托铸币商人",desc:"基础鱼竿，新手起步使用"},{name:"钢铁鱼竿",level:"+1",source:"合成：竹鱼竿+天然玉石x10+优质神秘木x30+优质玛那铁x30"},{name:"魔物骨鱼竿",level:"+2",source:"合成：钢铁鱼竿+天然玉石x30+稀有神秘木x30+稀有玛那铁x30"},{name:"黑曜石鱼竿",level:"+3",source:"合成：魔物骨鱼竿+天然玉石x60+黑曜石碎片x30+稀有神秘木+稀有玛那铁"},{name:"克拉肯鱼竿",level:"+3",source:"士兵娃娃远征(黎明海岸)"},{name:"维斯佩里温竿",level:"+4",source:"士兵娃娃远征(奎提斯统治区/巨木林/沉默湿地/黑铁砧驻地)"},{name:"黄金鱼竿",level:"+4",source:"神秘环球(杜兰德)"},{name:"梦幻鱼竿",level:"+4",source:"合成：梦幻玉石x15+珍贵神秘木x100+珍贵玛那铁x100"}],tips:["面鱼饵委托铸币商人每天限量50个，能开出Boss素材和天然玉石","特殊钓点约3小时刷新，限2小时/50次(咬饵才扣)，每次随机出5个(3显示+2隐藏)","快速收竿：预设Ctrl+键，连点2下取消收竿动画","钓鱼等级影响可钓鱼类和难度，高级鱼竿加更多钓鱼等级","幻象鱼(8种)需进入凯洛斯幻象回廊隐藏地图","钓鱼胜地推荐：殷红林(传点西水池)、贝德乐山脉(巢穴草原爬上去)、岩石镇城堡/泰梵特神殿(限雨天)"],spots:[{name:"殷红林",desc:"传点西边水池",condition:"水位需满(可用抽水装置)"},{name:"贝德乐山脉",desc:"由巢穴草原传点爬上去"},{name:"岩石镇城堡",desc:"城中水域",condition:"下雨时才出现"},{name:"泰梵特神殿",desc:"神殿周围水域",condition:"下雨时才出现"},{name:"亚奇图峡谷",desc:"峡谷底部",condition:"下雨时出现"},{name:"沉默湿地航船沼泽",desc:"黑立博金鱼和黑鳊鱼专属钓点"}]},ms={schedule:"每天8个时段(02/05/08/11/14/17/20/23点)。随机开放6个活动(3和平+1合作+1阵营战+1公会)。每周7张地区贡献证。",recommended:[{name:"化险为夷",reason:"3倍交货点，简单高效"},{name:"黑曜石获取战",reason:"3倍交货点，掉落珍贵材料"},{name:"治疗神兽之手",reason:"3倍交货点，奖励丰厚"}],tips:["地区贡献证每周重置7张，有证才能拿好奖励和活动分数","留在该地区到结束才得活动分数，中途离开只寄信给物品奖励","和平模式打怪缴交比个人分数，合作模式有阶段达成条件","杜兰德合作活动奖励含高磨结晶","阵营战/公会战累积够就缴交，死了身上东西会不见","化险为夷：打指定怪物几率获得交货物品，打够一定数量回报给NPC","黑曜石获取战：采集地图上特殊矿石，附近常有人打架要小心","神兽之手：帮神兽清怪后取得额外增益Buff，团队分工清怪效率高","活动结束前离开地区只寄信给物品奖励，不会得到活动分数"]},yh=[{id:"talandre-expansion",title:"Talandre 资料片上线 — 等级上限提升至55",date:"2026-03-06",summary:"Wilds of Talandre 大型更新上线，全新地图、新装备等级、武器精通系统重做，等级上限从50提升至55。",content:"Talandre 资料片将等级上限提升至55级，新增了广阔的全新区域和武器精通系统。装备方面新增了英雄2段层级，Crypt of Augmentation 4星副本也随之开放。侧面/背面攻击新增额外伤害加成，站位变得更重要了。跨服攻城战每三周一次也已上线。",author:"TL攻略站",tags:["更新","资料片"],icon:"🏔️"},{id:"update-331",title:"更新 3.31.0 — 战场调整 & 武器平衡",date:"2026-04-22",summary:"战场移除角色分工效果，浮空精灵花园改版，短剑和长矛问题修复。",content:"3.31.0 版本聚焦战场和武器平衡。战场移除坦克/打手/补师分工，排队速度快了很多。浮空精灵花园改版后控点更关键。短剑暗影精灵bug修复，长矛丧钟PVP触发率翻倍。",author:"TL攻略站",tags:["更新","补丁"],icon:"📋"},{id:"new-dungeon-crypt",title:"新4星副本：Crypt of Augmentation 攻略要点",date:"2026-03-15",summary:"对抗死灵法师 Velentra，战力5000+门槛，掉落T2关键装备。从配置到走位，野队开荒注意事项。",content:"Crypt of Augmentation 是Talandre新增的4星副本，Boss为死灵法师 Velentra。战力5000+门槛，推荐1坦1补2输出。P1阶段注意小兵聚怪和灵魂吸取驱散，P2阶段柱子躲避全屏AOE是关键。",author:"TL攻略站",tags:["副本","攻略"],icon:"💀"},{id:"invasion-event",title:"Arkeum 入侵活动 — 限时奖励 & 日程",date:"2026-01-15",summary:"Arkeum Legion 入侵活动开启，限时获取新表情、变形形态和混沌棱晶，持续到1月28日。",content:"Arkeum Legion 限时入侵活动，工作日每天3场周末4场。奖励包括限定表情、变形形态和混沌棱晶。附带武器平衡调整：弹道技能不再叠加增伤，弩弓技能调整，战场减伤翻倍。",author:"TL攻略站",tags:["活动","限时"],icon:"⚔️"},{id:"server-merge",title:"亚服服务器合并 & 新手追赶机制",date:"2026-05-10",summary:"亚服NCsoft宣布服务器合并计划，同时推出新手快速成长箱和世界树引导系统，降低入坑门槛。",content:"NCsoft 宣布亚服服务器合并，整合低活跃服务器。同步推出世界树引导系统帮助新手快速获得整套装备。亚服专属快速成长箱含英雄装备、技能书和符文，入坑门槛大幅降低。",author:"TL攻略站",tags:["服务器","新手"],icon:"🔄"},{id:"nebula-island",title:"星云岛激战场全面指南 — 跨服PVE/PVP",date:"2026-05-20",summary:"跨服星云岛激战场攻略，中立区/PVE区/PVP区详解，以及每周各时段活动安排与奖励获取技巧。",content:"星云岛是跨服PVE/PVP混合区域，每周5小时入场时间，可用充能石增加。分中立区、PVE迷雾森林和四个PVP区域。产出星云石、符文、人工制品和饰品，建议组队前往PVP区。",author:"TL攻略站",tags:["PVP","跨服"],icon:"🌌"},{id:"summer-event-2026",title:"2026夏日活动「幻象回廊」限时开启",date:"2026-05-28",summary:"夏日限定活动幻象回廊开放，新增8种幻象鱼、隐藏地图和夏日限定外观套装，钓鱼经验+50%。",content:"夏日活动幻象回廊通过神秘环球随机进入，限时隐藏地图内含稀有宝箱和8种幻象鱼。收集可兑换限定外观。活动期间钓鱼经验+50%，特殊钓点刷新加快，持续至6月25日。",author:"TL攻略站",tags:["活动","夏日","限时"],icon:"🏖️"},{id:"new-map-nix",title:"冰封边界：尼克斯 — TL史上最大更新 亚服6/23·国际服6/25",date:"2026-05-25",summary:"全新冰原地图尼克斯是TL史上最大区域，等级上限提至60、新武器拳套、新坐骑天刺与米里奈，7-8月更新路线图同步公开。",content:"尼克斯是TL史上最大更新，极寒冰原地图，等级上限提升至60。新增拳套武器（双姿态切换）、天刺/米里奈移动机制、两个合作副本和挑战模式。装备系统全面改革，成长路线更灵活。",author:"TL攻略站",tags:["更新","新地图","资料片"],icon:"❄️"},{id:"star-journey",title:"「星之旅程」系统上线 — 累积成长型内容",date:"2026-05-12",summary:"亚服5月12日更新新增星之旅程系统，通过冒险宝典、探查宝典、时空痕迹获得星之记忆永久提升能力值。",content:"星之旅程整合分散的成长内容，完成冒险宝典/探查宝典/时空痕迹获得星之记忆永久提升能力。新增时空奇异点和文物垂钓名胜。竞技场第6赛季和战场第1赛季同步开启。",author:"TL攻略站",tags:["更新","系统"],icon:"⭐"},{id:"summer-roadmap-2026",title:"尼克斯之后：7-8月更新路线图 — 龙骑士·泰拉首领·新战场",date:"2026-05-25",summary:"NCsoft公布尼克斯上线后的更新路线图：7月龙骑士拉姆斯+铁矿石摇篮副本+密封战斗战场，8月泰拉巨型Boss+攻城优化。",content:"NCsoft 公布尼克斯之后路线图。7月龙骑士拉姆斯、铁矿石摇篮和霜息洞穴副本、密封战斗战场。8月泰拉巨型Boss登场，攻城体验改进。亚服6月2日服务器整合。",author:"TL攻略站",tags:["更新","路线图","预告"],icon:"🗓️"},{id:"update-3-37-0-mq0wfrkr",title:"更新 3.37.0 — 例行维护与后续展望",date:"2026-06-03",summary:"TL 3.37.0 版本例行维护约3小时，为后续尼克斯资料片做准备。维护期间更新内容预览和版本变动分析。",content:"3.37.0 例行维护约3小时，主要为尼克斯资料片做前置准备。服务器端性能优化和bug修复。维护后下一个大版本即6月23日/25日上线的尼克斯更新。",author:"TL攻略站",tags:["更新"],icon:"📋"},{id:"nix-prep-june",title:"尼克斯倒计时8天！6月开发笔记与版本前瞻",date:"2026-06-17",summary:"距冰封边界：尼克斯上线仅剩8天。6月2日大更新详情：合服完成、烹饪UI重做、竞技场/星云岛关闭倒计时，以及时光痕迹双倍奖励活动正在进行中。",content:"距尼克斯上线仅剩8天（亚服6/23·国际服6/25）。6月2日更新合并服务器完成、料理UI重做。竞技场和星云岛将在尼克斯上线时暂时关闭，相关代币6月2
