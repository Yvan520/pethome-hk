name: Daily TL Content

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tl-nexus
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch news & generate pages
        run: node scripts/auto-fetch.js

      - name: Build site
        run: npm run build

      - name: Copy build output to repo root
        working-directory: ./
        run: |
          cp tl-nexus/dist/index.html index.html
          cp tl-nexus/sitemap.xml sitemap.xml 2>/dev/null || true
          cp -r tl-nexus/dist/news/ news/ 2>/dev/null || true
          cp -r tl-nexus/dist/images/* images/ 2>/dev/null || true

      - name: Commit and push
        working-directory: ./
        run: |
          git config user.name "TL Guide Bot"
          git config user.email "bot@berty.gamewayz.com"
          git add .
          if git diff --cached --quiet; then
            echo "No new content today"
          else
            git commit -m "feat: daily auto content ($(date +%Y-%m-%d))"
            git push
          fi
