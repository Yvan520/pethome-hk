name: Daily PawCity Article

on:
  schedule:
    - cron: '0 0 * * *'   # 08:00 HKT daily
  workflow_dispatch:       # manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Generate article
        env:
          API_KEY: ${{ secrets.LONGCAT_API_KEY }}
          API_BASE_URL: ${{ secrets.LONGCAT_API_BASE_URL }}
          MODEL_NAME: ${{ secrets.LONGCAT_MODEL_NAME }}
        run: python scripts/generate_article.py

      - name: Commit and push
        run: |
          git config user.name "PawCity Bot"
          git config user.email "bot@pethome.gamewayz.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily article auto-generate $(date +%Y-%m-%d)"
            git push
          fi
